version: '3.8'



services:

  app1:
      image: backend:v1
      container_name: app1
      networks:
        - app-network


  app2:
      image: backend:v2
      container_name: app2
      networks:
        - app-network


  app3:
      image: backend:v3
      container_name: app3
      networks:
        - app-network

  app4:
      image: backend:v4
      container_name: app4
      networks:
        - app-network

  proxy:
      image: nginx
      container_name: proxy
      ports:
        - "8080:80"
      volumes:
        - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      networks:
        - app-network

networks:
    app-network:
      driver: bridge
