name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t giobetancourtmtz/backend-ci ./backend-v1

      - name: Push Docker image
        run: docker push giobetancourtmtz/backend-ci

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull giobetancourtmtz/backend-ci
            docker stop backend-ci || true
            docker rm backend-ci || true
            docker run -d --name backend-ci -p 3000:80 giobetancourtmtz/backend-ci
